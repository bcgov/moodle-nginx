global:
  redis:
    password: ""
redis:
  persistence:
    enabled: true
    size: 600Mi
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
updateJob:
  resources:
    requests:
      memory: 32Mi
      cpu: 10m
replica:
  replicaCount: 5
  persistence:
    enabled: false
    size: 0Mi
  autoscaling:
    enabled: true
    minReplicas: 5
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60
  resources:
    requests:
      memory: 32Mi
      cpu: 100m
sentinel:
  enabled: true
  automateClusterRecovery: true
  persistence:
    enabled: false
    size: 0Mi
  resources:
    requests:
      memory: 32Mi
      cpu: 5m
auth:
  enabled: false
  sentinel: false
  password: ""
  usePasswordFileFromSecret: false
image:
  pullPolicy: Always
  debug: false
