server {
    listen 8080 default_server;
    root /var/www/html;

    index index.php;

    set $skip_cache 0;

    # POST requests should always go to PHP
    if ($request_method = POST) {
        set $skip_cache 1;
    }

    # URLs containing query strings should always go to PHP
    if ($query_string != "") {
        set $skip_cache 1;
    }

    # Don't cache uris containing the following segments
    if ($request_uri ~* "/admin/|/lib/|*.php|/forum/|index.php") {
        set $skip_cache 1;
    }

    # # Don't use the cache for logged in users or recent commenters
    # if ($http_cookie ~* "MoodleSession") {
    #     set $skip_cache 1;
    # }

    location /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location /robots.txt {
        log_not_found off;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.php;
    }

    location ~ [^/]\.php(/|$) {
        root /var/www/html;
        fastcgi_split_path_info  ^(.+\.php)(/.+)$;
        fastcgi_index            index.php;
        fastcgi_pass             php:9000;
        include                  fastcgi_params;
        fastcgi_read_timeout     1200s;
        fastcgi_keep_conn        off;
        fastcgi_param   PATH_INFO       $fastcgi_path_info;
        fastcgi_param   SCRIPT_FILENAME $document_root$fastcgi_script_name;
        client_body_buffer_size 256k;
        proxy_max_temp_file_size 10240m;
        proxy_buffers 500 2400k;
        proxy_busy_buffers_size 2400k;
        proxy_buffer_size 2400k;

        # Caching directives
        fastcgi_cache_path /var/cache/nginx levels=1:2 keys_zone=php_cache:100m inactive=60m use_temp_path=off;
        fastcgi_cache_key "$scheme$request_method$host$request_uri";
        fastcgi_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
        fastcgi_cache_lock on;
        fastcgi_cache_lock_timeout 5s;
        fastcgi_cache_valid 200 302 60m;
        fastcgi_cache_valid 404 1m;
        fastcgi_cache_bypass $skip_cache;
        fastcgi_no_cache $skip_cache;
    }

    location /nginx_status {
        stub_status;
        #allow 127.0.0.1;    #only allow requests from localhost
        #deny all;        #deny all other hosts
        allow all; #allow for local debugging
    }
}
