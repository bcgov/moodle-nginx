upstream  backend  {
    server   php:9000 max_fails=6 fail_timeout=30s;
    server   php-backup:9000 backup;
}

# Caching directives
fastcgi_cache_path /var/www/moodledata/nginx_cache levels=1:2 keys_zone=php_cache:1024m inactive=60m use_temp_path=off;
fastcgi_cache_key "$scheme$request_method$host$request_uri";

server {
    listen 8080 default_server;
    root /var/www/html;

    index index.php;

    set $skip_cache 1;

    client_header_timeout       1200;
    large_client_header_buffers 1024 8k;
    sendfile                    on;
    tcp_nopush                  on;
    tcp_nodelay                 on;
    server_tokens               off;
    keepalive_timeout           65;
    types_hash_max_size         2048;

    # Enable caching for static files
    location ~* ^(?!.*\.php).*\.(jpg|jpeg|png|gif|ico|css|js|monologo.*)$ {
        expires 1d;
        add_header Pragma public;
        add_header Cache-Control "public";
        set $skip_cache 0;
    }

    location /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location /robots.txt {
        log_not_found off;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.php;
    }

    location ~ [^/]\.php(/|$) {
        root /var/www/html;
        fastcgi_split_path_info  ^(.+\.php)(/.+)$;
        fastcgi_index            index.php;
        fastcgi_pass             backend;
        include                  fastcgi_params;
        fastcgi_read_timeout     1200s;
        fastcgi_keep_conn        off;
        fastcgi_param   PATH_INFO       $fastcgi_path_info;
        fastcgi_param   SCRIPT_FILENAME $document_root$fastcgi_script_name;

        proxy_max_temp_file_size 1024m;
        client_max_body_size 128m;
        proxy_buffers 800 100m;
        proxy_buffer_size 512m;
        proxy_busy_buffers_size 512m;
        client_body_buffer_size 512m;

        # Caching directives
        fastcgi_cache_use_stale error timeout invalid_header updating http_500 http_503 http_403 http_404;
        fastcgi_cache_lock on;
        fastcgi_cache_lock_timeout 5s;
        fastcgi_cache_valid 200 128m;
        fastcgi_cache_bypass $skip_cache;
        fastcgi_no_cache $skip_cache;
    }

    location /nginx_status {
        stub_status;
        #allow 127.0.0.1;	#only allow requests from localhost
        #deny all;		#deny all other hosts
        allow all; #allow for local debugging
    }

    location ~ ^/(status|ping)$ {
        allow all;
        root /var/www/html;
        fastcgi_split_path_info  ^(.+\.php)(/.+)$;
        fastcgi_index            index.php;
        fastcgi_pass             backend;
        include                  fastcgi_params;
        fastcgi_read_timeout     1200s;
        fastcgi_keep_conn        off;
        fastcgi_param   PATH_INFO       $fastcgi_path_info;
        fastcgi_param   SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
