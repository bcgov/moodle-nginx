upstream  backend  {
    server   php:9000 max_fails=6 fail_timeout=30s;
    server   php-backup:9000 backup;
}

# Caching directives
# fastcgi
fastcgi_cache_path /mnt/ramdisk/filecache/nginx_fastcgi_cache levels=1:2 keys_zone=php_cache:100m inactive=60m use_temp_path=off;
fastcgi_cache_key "$scheme$request_method$host$request_uri $cookie_userid";
fastcgi_cache_lock on;
fastcgi_cache_use_stale error timeout invalid_header updating http_500 http_503 http_403 http_404;
fastcgi_cache_valid 200 1d;
fastcgi_ignore_headers Cache-Control Expires Set-Cookie;
fastcgi_cache_lock_timeout 60s;
# proxy
proxy_cache_path /mnt/ramdisk/filecache/nginx_proxy_cache levels=1:2 keys_zone=static_cache:60m inactive=120m use_temp_path=off;
proxy_cache_key "$scheme$request_method$host$request_uri";
proxy_cache_lock on;
proxy_cache_lock_age 60s;
proxy_cache_lock_timeout 60s;
proxy_cache_valid 200 1d;
proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

# Map directive to set skip_cache and test_type based on content_type
# map $request_uri $test_type {
#     default nocache;
#     ~*\.js* js;
#     ~*image* image;
#     ~*font* font;
# }

# map $test_type $skip_cache {
#     default 0;
#     "nocache" 1;
# }

server {
    listen 8080 default_server;
    root /var/www/html;

    index index.php;

    client_header_timeout       12000;
    large_client_header_buffers 1024 8k;
    sendfile                    on;
    tcp_nopush                  on;
    tcp_nodelay                 on;
    server_tokens               off;
    keepalive_timeout           650;
    types_hash_max_size         2048;

    set $skip_cache 1;

    # Cache uris containing the following segments
    if ($request_uri ~* "/theme/|/lib/javascript.php/|/lib/requirejs.php/") {
        set $skip_cache 0;
    }

    # Enable caching for static files
    # .*(\.php).*(jpg|jpeg|png|gif|ico|css|js|monologo.*)$
    # location ~* ^(?!.*\.php).*\.(jpg|jpeg|png|gif|ico|css|js|monologo.*)$ {
    location ~* ^(?!.*\.php).*(.*\.)?(jpg|jpeg|png|gif|ico|css|js|monologo.*)$ {
        expires 1d;
        proxy_cache static_cache;
        proxy_cache_bypass $skip_cache;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Pragma public;
        add_header Cache-Control "public";
        add_header "X-Upstream-Content-Type" $upstream_http_content_type;
        # add_header "X-Test-Type-File" $test_type;
        add_header "X-Skip-Cache-File" $skip_cache;
        add_header "X-Proxy-Cache" $upstream_cache_status;
    }

    location /dataroot/ {
        internal;
        alias /var/www/moodledata/; # ensure the path ends with /
    }

    location /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location /robots.txt {
        log_not_found off;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.php;
        add_header X-Debug-Location "root";
    }

    location ~ [^/]\.php(/|$) {
        root /var/www/html;
        fastcgi_split_path_info  ^(.+\.php)(\/.*)$;

        # Note: Store the original path_info. It will be wiped out in a moment by try_files.
        set $path_info $fastcgi_path_info;

        # Look for the php file. If not found then jump to @routed.
        # try_files $fastcgi_script_name $fastcgi_script_name/;
        try_files $fastcgi_script_name =404;

        fastcgi_index            index.php;
        fastcgi_pass             backend;
        fastcgi_buffers          1024 64k;
        include                  fastcgi_params;
        fastcgi_read_timeout     600s;
        fastcgi_keep_conn        off;
        fastcgi_param   PATH_INFO       $path_info;
        fastcgi_param   SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;

        proxy_max_temp_file_size 2048m;
        client_max_body_size 256m;
        proxy_buffers 1000 100m;
        proxy_buffer_size 512m;
        proxy_busy_buffers_size 999m;
        client_body_buffer_size 256m;

        # Caching directives
        fastcgi_cache_bypass $skip_cache;
        # fastcgi_no_cache $skip_cache;
        fastcgi_cache php_cache;
        # add_header "X-Test-Type-PHP" $test_type;
        add_header "X-Upstream-Content-Type" $upstream_http_content_type;
        add_header "X-Skip-Cache-PHP" $skip_cache;
        add_header "X-Cache-PHP" $upstream_cache_status;
    }

    location /nginx_status {
        stub_status;
        #allow 127.0.0.1;	#only allow requests from localhost
        #deny all;		#deny all other hosts
        allow all; #allow for local debugging
    }

    location ~ ^/(status|ping)$ {
        allow all;
        root /var/www/html;
        fastcgi_split_path_info  ^(.+\.php)(/.+)$;
        fastcgi_index            index.php;
        fastcgi_pass             backend;
        include                  fastcgi_params;
        fastcgi_read_timeout     12000s;
        fastcgi_keep_conn        off;
        fastcgi_param   PATH_INFO       $fastcgi_path_info;
        fastcgi_param   SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
