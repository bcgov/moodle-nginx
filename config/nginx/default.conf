# Basic Nginx server block configuration
worker_processes auto;
worker_cpu_affinity auto;
worker_rlimit_nofile 100000;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

upstream  backend  {
    server   php:9000 max_fails=2 fail_timeout=10s;
    server   php-backup:9000 backup;
}

server {
    listen 8080 default_server;
    root /var/www/html;

    index index.php;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    server_tokens off;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    open_file_cache max=10000 inactive=60s;
    open_file_cache_valid 90s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Enable caching for static files
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires 30d;
        add_header Pragma public;
        add_header Cache-Control "public";
    }

    location /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location /robots.txt {
        log_not_found off;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.php;
    }

    location ~ [^/]\.php(/|$) {
        try_files $uri =404;
        root /var/www/html;
        fastcgi_split_path_info  ^(.+\.php)(/.+)$;
        fastcgi_index            index.php;
        fastcgi_pass             backend;
        include                  fastcgi_params;
        fastcgi_read_timeout     1200s;
        fastcgi_keep_conn        off;
        fastcgi_buffers          8 512k;
        fastcgi_buffer_size      512k;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        proxy_max_temp_file_size    0;
        proxy_buffers               8 2m;
        proxy_buffer_size           12m;
        proxy_busy_buffers_size     12m;
        proxy_connect_timeout       1200;
        proxy_send_timeout          1200;
        proxy_read_timeout          1200;
        client_body_buffer_size     12m;
        client_header_timeout       1200;
        client_body_timeout         1200;
        client_max_body_size        32m;
        client_header_buffer_size 1k;
        large_client_header_buffers 8 8k;
        send_timeout                1200;
    }

    location /nginx_status {
        stub_status;
        #allow 127.0.0.1;	#only allow requests from localhost
        #deny all;		#deny all other hosts
        allow all; #allow for local debugging
    }

    # Disable access to sensitive files
    location ~ /(config|vendor|\.git|\.ht|composer\..*) {
        deny all;
    }
}
