services:
  build:
    deploy:
      replicas: 0
    tty: true
    restart: no
    environment:
      PHP_IMAGE: ${PHP_IMAGE:-php:8.3-fpm}
      DEPLOY_ENVIRONMENT: local
      MOODLE_BRANCH_VERSION: MOODLE_405_STABLE
      HVP_URL: "https://github.com/h5p/moodle-mod_hvp"
      HVP_BRANCH_VERSION: stable
      PSAELMSYNC_URL: "https://github.com/bcgov/psaelmsync"
      PSAELMSYNC_BRANCH_VERSION: main
      REPORT_ALL_BACKUPS_URL: "https://github.com/catalyst/moodle-report_allbackups"
      REPORT_ALL_BACKUPS_BRANCH_VERSION: MOODLE_400_STABLE
      THEME_BRANCH_VERSION: main
      THEME_URL: "https://github.com/bcgov/bcgovpsa-moodle"
      PCURATOR_URL: "https://github.com/itr8tech/pathcurator-moodle/"
      PCURATOR_BRANCH_VERSION: main
      COURSESEARCH_URL: "https://github.com/bcgov/moodle-course-search/"
      COURSESEARCH_BRANCH_VERSION: main
    env_file:
      - example.env
    build:
      context: .
      dockerfile: Moodle.Dockerfile
      args:
        DEPLOY_ENVIRONMENT: ${DEPLOY_ENVIRONMENT:-local}
        DOCKER_FROM_IMAGE: ${IMAGE_REPO}${PHP_IMAGE:-php:8.3-fpm}
        MOODLE_BRANCH_VERSION: ${MOODLE_BRANCH_VERSION:-MOODLE_401_STABLE}
        HVP_URL: ${HVP_URL:-https://github.com/h5p/moodle-mod_hvp}
        HVP_BRANCH_VERSION: ${HVP_BRANCH_VERSION:-stable}
        PSAELMSYNC_URL: ${PSAELMSYNC_URL:-https://github.com/bcgov/psaelmsync}
        PSAELMSYNC_BRANCH_VERSION: ${PSAELMSYNC_BRANCH_VERSION:-main}
        REPORT_ALL_BACKUPS_URL: ${REPORT_ALL_BACKUPS_URL:-https://github.com/catalyst/moodle-report_allbackups}
        REPORT_ALL_BACKUPS_BRANCH_VERSION: ${REPORT_ALL_BACKUPS_BRANCH_VERSION:-MOODLE_400_STABLE}
        THEME_URL: ${THEME_URL:-https://github.com/bcgov/bcgovpsa-moodle}
        THEME_BRANCH_VERSION: ${THEME_BRANCH_VERSION:-main}
        PCURATOR_URL: ${PCURATOR_URL:-https://github.com/itr8tech/pathcurator-moodle/}
        PCURATOR_BRANCH_VERSION: ${PCURATOR_BRANCH_VERSION:-main}
        COURSESEARCH_URL: ${COURSESEARCH_URL:-https://github.com/bcgov/moodle-course-search/}
        COURSESEARCH_BRANCH_VERSION: ${COURSESEARCH_BRANCH_VERSION:-main}
    volumes:
      - ./temp/docker/build-0/var/www/html:/var/www/html:delegated
    command:  tail -F anything

  php:
    container_name: php
    deploy:
      replicas: 0
    tty: true
    restart: no
    env_file:
      - example.env
      - example.secrets
    environment:
      DB_PASSWORD: ${DB_PASSWORD:-moodle}
      DB_USER: ${DB_USER:-moodle}
      DB_NAME: ${DB_NAME:-moodle}
      PHP_IMAGE: ${PHP_IMAGE:-php:8.3-fpm}
    build:
      context: .
      dockerfile: PHP.Dockerfile
      args:
        DOCKER_FROM_IMAGE: ${IMAGE_REPO}${PHP_IMAGE:-php:8.3-fpm}
        PHP_INI_ENVIRONMENT: ${PHP_INI_ENVIRONMENT:-production}
    command: php-fpm
    healthcheck:
      test: [
        "CMD-SHELL",
        "php-fpm-healthcheck"
      ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    container_name: web
    image: ${WEB_IMAGE:-nginxinc/nginx-unprivileged:1-alpine-slim}
    restart: no
    deploy:
      replicas: 0

  db:
    image: ${MARIADB_IMAGE:-bitnamilegacy/mariadb-galera:10.6}
    restart: no
    deploy:
      replicas: 0
    env_file: example.env
    healthcheck:
      test: [
        "CMD-SHELL",
        "healthcheck.sh --innodb_initialized --connect"
      ]
      interval: 10s
      timeout: 5s
      retries: 5

  cron:
    container_name: cron
    deploy:
      replicas: 0
    restart: no
    env_file: example.env
    build:
      context: .
      dockerfile: CRON.Dockerfile
      args:
        DOCKER_FROM_IMAGE: ${IMAGE_REPO}${CRON_IMAGE:-php:8.3-cli}
        PHP_INI_ENVIRONMENT: ${PHP_INI_ENVIRONMENT:-production}
    volumes:
      - ./temp/docker/build-0/var/www/html:/var/www/html:delegated
