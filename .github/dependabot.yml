# Dependabot configuration for automated dependency updates
# Generated: 2025-10-29T16:42:57Z

version: 2
updates:
  # Docker images in compose files
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    reviewers:
      - "@bcgov/platform-services"
    commit-message:
      prefix: "deps(docker)"
      include: "scope"
    
  # Docker images in dependencies manifest
  - package-ecosystem: "docker" 
    directory: "/openshift/dependencies"
    schedule:
      interval: "weekly"  
      day: "monday"
      time: "10:00"
    reviewers:
      - "@bcgov/platform-services"
    commit-message:
      prefix: "deps(security)"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday" 
      time: "09:00"
    reviewers:
      - "@bcgov/platform-services"
    commit-message:
      prefix: "deps(actions)"
      include: "scope"
