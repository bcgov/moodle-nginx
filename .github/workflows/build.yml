# ============================================================================
# 🚀 Build and Deploy to OpenShift
# ============================================================================
# This file lives on the DEFAULT branch (main) so GitHub shows the
# "Run workflow" button in the Actions tab.
#
# HOW IT WORKS:
#   push / pull_request on 950003-* branches:
#     → GitHub automatically uses THAT branch's copy of build.yml (same path).
#     → Main's code is never reached for push/PR events.
#
#   workflow_dispatch (manual trigger):
#     → If someone selects a 950003-* branch in the dropdown, that branch's
#       copy runs directly — this file is not used.
#     → If someone accidentally leaves "main" selected, this file catches it,
#       dispatches the build to the correct target branch, and exits cleanly.
#
#   workflow_call:
#     → Used by scheduled-rebuild.yml to trigger builds on target branches.
# ============================================================================
name: 🚀 Build and Deploy to OpenShift

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'GitHub Environment to deploy to'
        type: environment
        required: true
      reason:
        description: 'Reason for manual rebuild (logged for audit purposes)'
        required: false
        default: 'Manual rebuild to refresh external dependencies'
      skip_deploy:
        description: 'Build images only, skip OpenShift deployment (YES/NO)'
        type: choice
        options:
          - 'NO'
          - 'YES'
        required: false
        default: 'NO'
      confirm_production:
        description: 'For 950003-prod only, type PROD to confirm maintenance window and downtime'
        required: false
        default: ''

  push:
    branches:
      - 950003-dev
      - 950003-test
      - 950003-prod
  pull_request:
    branches:
      - 950003-dev
      - 950003-test
      - 950003-prod

permissions:
  contents: read
  actions: write      # Required to dispatch workflow on target branch

jobs:
  # -------------------------------------------------------------------------
  # When workflow_dispatch runs on main, redirect to the target branch.
  # The target branch's build.yml has the real pipeline (checkEnv, builds,
  # deploy, lighthouse, notify). This job dispatches to it and exits.
  # -------------------------------------------------------------------------
  redirect:
    name: 🔀 Redirect to target branch
    runs-on: ubuntu-22.04
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Dispatch build to ${{ inputs.target_environment }}
        uses: actions/github-script@v7
        with:
          script: |
            const target = '${{ inputs.target_environment }}';

            console.log(`🔀 Manual trigger detected on main — redirecting to branch: ${target}`);
            console.log(`   Reason: ${{ inputs.reason }}`);

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build.yml',
              ref: target,
              inputs: {
                target_environment: target,
                reason: `${{ inputs.reason }}`,
                skip_deploy: '${{ inputs.skip_deploy }}',
                confirm_production: '${{ inputs.confirm_production }}'
              }
            });

            console.log(`✅ Build dispatched to ${target}. Check the Actions tab for the new run.`);
            console.log(`   This run on main will now exit — the real pipeline runs on ${target}.`);
