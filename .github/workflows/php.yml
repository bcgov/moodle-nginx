name: PHP

concurrency:
  group: php-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  APP: moodle
  USER: ${{ github.actor }}

on:
  workflow_call:
    inputs:
      SKIP_BUILDS:
        type: string
        description: 'Skip builds if set to YES'
        required: false
        default: 'NO'
jobs:
  build-images:
    name: '🐸 Build to JFrog'
    runs-on: ubuntu-22.04
    steps:
      # Checkout the PR branch
      - name: 📤 Checkout Target Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      # Login to Artifactory
      - name: 🔑 Login to Artifactory
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ARTIFACTORY_URL }}
          username: ${{ secrets.ARTIFACTORY_USER }}
          password: ${{ secrets.ARTIFACTORY_PASSWORD }}

      - name: Setup Env Vars
        id: dotenv
        uses: falti/dotenv-action@v1
        with:
          path: example.env
          export-variables: true
          keys-case: upper

      - name: Setup Versions Env Vars
        id: dotenv_versions
        uses: falti/dotenv-action@v1
        with:
          path: example.versions.env
          export-variables: true
          keys-case: upper

      # Pull latest PHP base image and push to Artifactory (optimized)
      - name: 🛠️ Optimized PHP base image push to Artifactory
        run: |
          # Use the utility script for consistency across all workflows
          if [ -f "./openshift/scripts/optimize-image-push.sh" ]; then
            echo "🚀 Using optimize-image-push.sh utility script"
            chmod +x ./openshift/scripts/optimize-image-push.sh
            ./openshift/scripts/optimize-image-push.sh \
              --source-image "${{ env.PHP_IMAGE }}" \
              --artifactory-url "${{ secrets.ARTIFACTORY_URL }}" \
              --timeout 300 \
              --retry-count 3
          else
            echo "❌ optimize-image-push.sh utility script not found"
            echo "� This script is required for optimized image handling"
            echo "📋 Expected location: ./openshift/scripts/optimize-image-push.sh"
            echo "� Please ensure the utility script is included in the repository"
            exit 1
          fi

      # Report optimization results
      - name: 📊 Image Optimization Report
        if: always()
        run: |
          echo "======================================"
          echo "📊 PHP BASE IMAGE OPTIMIZATION REPORT"
          echo "======================================"
          echo "Image: ${{ env.PHP_IMAGE }}"
          echo "Cache Hit: ${IMAGE_CACHE_HIT:-unknown}"
          echo "Build Time: ${IMAGE_BUILD_TIME:-unknown}s"
          echo "Operation: ${IMAGE_OPERATION:-standard}"

          if [ "${IMAGE_CACHE_HIT:-false}" = "true" ]; then
            echo "💡 Time Saved: ~60-300s (typical pull/push duration)"
            echo "🎉 Optimization: SUCCESSFUL"
          else
            echo "🔄 Optimization: Image was updated or unavailable"
          fi
          echo "======================================"

      # Build PHP Image and push to Artifactory
      - name: 🛠️ Build PHP Image and push to Artifactory
        run: docker buildx build --cache-from type=gha --cache-to type=gha,mode=max --build-arg DOCKER_FROM_IMAGE=${{ secrets.ARTIFACTORY_URL }}/${{ env.PHP_IMAGE }} --tag ${{ secrets.ARTIFACTORY_URL }}/${{ env.PHP_DEPLOYMENT_NAME }}:${{ github.ref_name }} --output=type=image,push=true --push -f ${{ env.PHP_DOCKER_FILE_PATH }} .
