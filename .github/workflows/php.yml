name: PHP

concurrency:
  group: php-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP: moodle
  USER: ${{ github.actor }}

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-images:
    name: '🐸 Build to JFrog'
    runs-on: ubuntu-22.04
    steps:
      # Checkout the PR branch
      - name: 📤 Checkout Target Branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}

      # Login to Artifactory (with retry for transient network issues)
      - name: 🔁 Artifactory login with retry
        run: |
          for attempt in 1 2 3; do
            if docker login "${{ secrets.ARTIFACTORY_URL }}" \
              -u "${{ secrets.ARTIFACTORY_USER }}" \
              -p "${{ secrets.ARTIFACTORY_PASSWORD }}" 2>&1; then
              echo "✅ Artifactory login succeeded (attempt $attempt)"
              exit 0
            fi
            echo "⚠️ Login attempt $attempt/3 failed, retrying in 10s..."
            sleep 10
          done
          echo "❌ Artifactory login failed after 3 attempts"
          exit 1

      - name: 🔑 Login to Artifactory
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ARTIFACTORY_URL }}
          username: ${{ secrets.ARTIFACTORY_USER }}
          password: ${{ secrets.ARTIFACTORY_PASSWORD }}

      - name: Setup Env Vars
        id: dotenv
        uses: falti/dotenv-action@v1
        with:
          path: example.env
          export-variables: true
          keys-case: upper

      - name: Setup Versions Env Vars
        id: dotenv_versions
        uses: falti/dotenv-action@v1
        with:
          path: example.versions.env
          export-variables: true
          keys-case: upper

      - name: Set up Docker Buildx (container driver)
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: network=host
          buildkitd-flags: --debug

      # Pull latest PHP base image and push to Artifactory (optimized)
      - name: 🛠️ Optimized PHP base image push to Artifactory
        run: |
          # Use the utility script for consistency across all workflows
          if [ -f "./openshift/scripts/optimize-image-push.sh" ]; then
            echo "🚀 Using optimize-image-push.sh utility script"
            chmod +x ./openshift/scripts/optimize-image-push.sh
            ./openshift/scripts/optimize-image-push.sh \
              --source-image "${{ env.PHP_IMAGE }}" \
              --artifactory-url "${{ secrets.ARTIFACTORY_URL }}" \
              --timeout 300 \
              --retry-count 3
          else
            echo "❌ optimize-image-push.sh utility script not found"
            echo "� This script is required for optimized image handling"
            echo "📋 Expected location: ./openshift/scripts/optimize-image-push.sh"
            echo "� Please ensure the utility script is included in the repository"
            exit 1
          fi

      # Report optimization results
      - name: 📊 Image Optimization Report
        if: always()
        run: |
          echo "======================================"
          echo "📊 PHP BASE IMAGE OPTIMIZATION REPORT"
          echo "======================================"
          echo "Image: ${{ env.PHP_IMAGE }}"
          echo "Cache Hit: ${{ env.IMAGE_CACHE_HIT || 'false' }}"
          echo "Build Time: ${{ env.IMAGE_BUILD_TIME || '0' }}s"
          echo "Operation: ${{ env.IMAGE_OPERATION || 'standard' }}"

          if [ "${{ env.IMAGE_CACHE_HIT }}" = "true" ]; then
            echo "💡 Time Saved: ~60-300s (typical pull/push duration)"
            echo "🎉 Optimization: SUCCESSFUL"
          else
            echo "🔄 Optimization: Image was updated or unavailable"
          fi
          echo "======================================"

      # Build and push PHP Image to Artifactory
      - name: 🛠️ Build and Push PHP Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ env.PHP_DOCKER_FILE_PATH }}
          provenance: false
          outputs: type=image,push=true,oci-mediatypes=false
          tags: ${{ secrets.ARTIFACTORY_URL }}/${{ env.PHP_DEPLOYMENT_NAME }}:${{ github.ref_name }}
          build-args: |
            DOCKER_FROM_IMAGE=${{ secrets.ARTIFACTORY_URL }}/${{ env.PHP_IMAGE }}
          cache-from: type=gha,scope=php
          cache-to: type=gha,scope=php,mode=min
