name: Moodle

concurrency:
  group: moodle-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  APP: moodle
  USER: ${{ github.actor }}

on:
  workflow_call:
    inputs:
      MOODLE_URL:
        required: true
        type: string
      MOODLE_BRANCH_VERSION:
        required: true
        type: string
      PSAELMSYNC_URL:
        required: true
        type: string
      PSAELMSYNC_BRANCH_VERSION:
        required: true
        type: string
      HVP_URL:
        required: true
        type: string
      HVP_BRANCH_VERSION:
        required: true
        type: string
      REPORT_ALL_BACKUPS_URL:
        required: true
        type: string
      REPORT_ALL_BACKUPS_BRANCH_VERSION:
        required: true
        type: string
      THEME_URL:
        required: true
        type: string
      THEME_BRANCH_VERSION:
        required: true
        type: string
      COURSESEARCH_URL:
        required: true
        type: string
      COURSESEARCH_BRANCH_VERSION:
        required: true
        type: string
      PCURATOR_URL:
        required: true
        type: string
      PCURATOR_BRANCH_VERSION:
        required: true
        type: string

jobs:
  build-images:
    name: '🐸 Build to JFrog'
    runs-on: ubuntu-22.04
    steps:
      # Checkout the PR branch
      - name: 📤 Checkout Target Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      # Login to Artifactory
      - name: 🔑 Login to Artifactory
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ARTIFACTORY_URL }}
          username: ${{ secrets.ARTIFACTORY_USER }}
          password: ${{ secrets.ARTIFACTORY_PASSWORD }}

      - name: Setup Env Vars
        id: dotenv
        uses: falti/dotenv-action@v1
        with:
          path: example.env
          export-variables: true
          keys-case: upper

      - name: Setup Versions Env Vars
        id: dotenv_versions
        uses: falti/dotenv-action@v1
        with:
          path: example.versions.env
          export-variables: true
          keys-case: upper

      - name: Set up Docker Buildx (container driver)
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver-opts: network=host
          buildkitd-flags: --debug

      # 🔧 Install Trivy for post-build security scanning
      - name: 🛡️ Install Trivy
        run: |
          # Trivy installation is fast (~5-10s), no need to cache
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy
          trivy --version

      # 🗄️ Cache Trivy vulnerability database (refreshed daily)
      - name: 🗄️ Cache Trivy Database
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: ${{ runner.os }}-trivy-db-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-trivy-db-

      - name: 🐸 Build to JFrog
        run: |
          export BUILDKIT_PROGRESS=plain

          # Build image but don't push yet
          docker buildx build \
            --cache-from type=registry,ref=${{ secrets.ARTIFACTORY_URL }}/${{ env.MOODLE_DEPLOYMENT_NAME }}:buildcache \
            --cache-from type=gha,scope=moodle-${{ github.ref_name }} \
            --cache-to type=registry,ref=${{ secrets.ARTIFACTORY_URL }}/${{ env.MOODLE_DEPLOYMENT_NAME }}:buildcache,mode=max \
            --cache-to type=gha,scope=moodle-${{ github.ref_name }},mode=min \
            --build-arg MOODLE_URL=${{ inputs.MOODLE_URL }} \
            --build-arg MOODLE_BRANCH_VERSION=${{ inputs.MOODLE_BRANCH_VERSION }} \
            --build-arg THEME_URL=${{ inputs.THEME_URL }} \
            --build-arg THEME_BRANCH_VERSION=${{ inputs.THEME_BRANCH_VERSION }} \
            --build-arg PCURATOR_URL=${{ inputs.PCURATOR_URL }} \
            --build-arg PCURATOR_BRANCH_VERSION=${{ inputs.PCURATOR_BRANCH_VERSION }} \
            --build-arg COURSESEARCH_URL=${{ inputs.COURSESEARCH_URL }} \
            --build-arg COURSESEARCH_BRANCH_VERSION=${{ inputs.COURSESEARCH_BRANCH_VERSION }} \
            --build-arg HVP_URL=${{ inputs.HVP_URL }} \
            --build-arg HVP_BRANCH_VERSION=${{ inputs.HVP_BRANCH_VERSION }} \
            --build-arg PSAELMSYNC_URL=${{ inputs.PSAELMSYNC_URL }} \
            --build-arg PSAELMSYNC_BRANCH_VERSION=${{ inputs.PSAELMSYNC_BRANCH_VERSION }} \
            --build-arg REPORT_ALL_BACKUPS_URL=${{ inputs.REPORT_ALL_BACKUPS_URL }} \
            --build-arg REPORT_ALL_BACKUPS_BRANCH_VERSION=${{ inputs.REPORT_ALL_BACKUPS_BRANCH_VERSION }} \
            --build-arg MOODLE_CACHE_BUST=${{ github.run_id }} \
            --build-arg PLUGIN_CACHE_BUST=${{ github.run_id }} \
            --build-arg DOCKER_FROM_IMAGE=${{ secrets.ARTIFACTORY_URL }}/${{ env.PHP_DEPLOYMENT_NAME }}:${{ github.ref_name }} \
            --tag ${{ secrets.ARTIFACTORY_URL }}/${{ env.MOODLE_DEPLOYMENT_NAME }}:${{ github.ref_name }} \
            --output=type=docker \
            -f ${{ env.MOODLE_DOCKER_FILE_PATH }} \
            .

      # 🔒 Security scan built image BEFORE pushing to Artifactory
      - name: 🔒 Security Scan Built Image
        run: |
          source openshift/scripts/utils/docker-security.sh

          # Determine severity level from SECURITY_SCAN_LEVEL (inherited from build.yml env)
          SEVERITY="CRITICAL,HIGH"
          if [ "${{ env.SECURITY_SCAN_LEVEL }}" = "FULL" ]; then
            SEVERITY="CRITICAL,HIGH,MEDIUM"
          elif [ "${{ env.SECURITY_SCAN_LEVEL }}" = "BASIC" ]; then
            SEVERITY="CRITICAL,HIGH"
          elif [ "${{ env.SECURITY_SCAN_LEVEL }}" = "MINIMAL" ]; then
            SEVERITY="CRITICAL"
          fi

          # Determine if we should exit on critical based on SECURITY_SCAN_EXIT_ON
          EXIT_ON_CRITICAL="false"
          if [ "${{ env.SECURITY_SCAN_EXIT_ON }}" = "CRITICAL" ]; then
            EXIT_ON_CRITICAL="true"
          elif [ "${{ env.SECURITY_SCAN_EXIT_ON }}" = "HIGH" ]; then
            EXIT_ON_CRITICAL="true"
          elif [ "${{ env.SECURITY_SCAN_EXIT_ON }}" = "MEDIUM" ]; then
            EXIT_ON_CRITICAL="true"
          elif [ "${{ env.SECURITY_SCAN_EXIT_ON }}" = "ANY" ]; then
            EXIT_ON_CRITICAL="true"
          fi

          echo "🔒 Moodle Image Security Scan Configuration:"
          echo "  Level: ${{ env.SECURITY_SCAN_LEVEL }} → Severity: $SEVERITY"
          echo "  Exit on: ${{ env.SECURITY_SCAN_EXIT_ON }} → Block build: $EXIT_ON_CRITICAL"
          echo ""

          # Scan the built image (now available locally)
          scan_built_image_for_github_actions \
            "${{ secrets.ARTIFACTORY_URL }}/${{ env.MOODLE_DEPLOYMENT_NAME }}:${{ github.ref_name }}" \
            "$SEVERITY" \
            "$EXIT_ON_CRITICAL"      # Only push if security scan passed
      - name: 📤 Push to Artifactory
        run: |
          echo "Pushing validated image to Artifactory..."
          docker push ${{ secrets.ARTIFACTORY_URL }}/${{ env.MOODLE_DEPLOYMENT_NAME }}:${{ github.ref_name }}
