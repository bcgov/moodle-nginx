name: Helm Images

concurrency:
  group: helm-images-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP: helm-images
  USER: ${{ github.actor }}

on:
  workflow_call:
    inputs:
      SKIP_BUILDS:
        type: string
        description: 'Skip builds if set to YES'
        required: false
        default: 'NO'

jobs:
  build-images:
    name: '🐸 Pull and Push Images to JFrog'
    runs-on: ubuntu-22.04
    steps:
      - name: 📤 Checkout Target Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          sparse-checkout: |
            example.env
            example.versions.env
            openshift/scripts/optimize-image-push.sh

      - name: Setup Env Vars
        id: dotenv
        uses: falti/dotenv-action@v1
        with:
          path: example.env
          export-variables: true
          keys-case: upper

      - name: Setup Env Version Vars
        id: dotenv_versions
        uses: falti/dotenv-action@v1
        with:
          path: example.versions.env
          export-variables: true
          keys-case: upper

      - name: Check Helm Image Vars
        run: |
          echo "🔍 Helm Chart Images to Cache in Artifactory:"
          echo "MARIADB_IMAGE: ${{ env.MARIADB_IMAGE }}"
          echo "REDIS_IMAGE: ${{ env.REDIS_IMAGE }}"
          echo "REDIS_SENTINEL_IMAGE: ${{ env.REDIS_SENTINEL_IMAGE }}"
          echo "BACKUP_IMAGE: ${{ env.BACKUP_IMAGE }}"
          echo ""
          echo "Registry Configuration:"
          echo "HELM_REPO: ${{ env.HELM_REPO }}"
          echo "ARTIFACTORY_REGISTRY: ${{ env.ARTIFACTORY_REGISTRY }}"
          echo ""
          echo "📝 Note: These are cached for supply chain resilience"
          echo "📝 Deployment scripts can switch between upstream and Artifactory"

      # Login to Artifactory
      - name: 🔑 Login to Artifactory
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ARTIFACTORY_URL }}
          username: ${{ secrets.ARTIFACTORY_USER }}
          password: ${{ secrets.ARTIFACTORY_PASSWORD }}

      # Setup Docker Buildx for advanced features including cache
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Cache Docker layers in GitHub Actions for cross-deployment reuse
      - name: 🗂️ Setup Docker Layer Cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          # Use content-based cache key for maximum reuse across deployments
          # Cache will persist until image versions change in example.versions.env
          key: helm-images-${{ runner.os }}-${{ hashFiles('example.versions.env') }}-v2
          restore-keys: |
            helm-images-${{ runner.os }}-${{ hashFiles('example.versions.env') }}-
            helm-images-${{ runner.os }}-

      # Pre-pull and cache common base layers to speed up subsequent operations
      - name: 🚀 Pre-cache Common Base Layers
        run: |
          echo "🔥 Pre-pulling common base layers for caching..."

          # Pre-pull the Helm images to populate local Docker cache
          # This speeds up the optimize-image-push.sh script operations
          IMAGES_TO_CACHE=(
            "${{ env.HELM_REPO }}/${{ env.MARIADB_IMAGE }}"
            "${{ env.HELM_REPO }}/${{ env.REDIS_IMAGE }}"
            "${{ env.HELM_REPO }}/${{ env.REDIS_SENTINEL_IMAGE }}"
            "${{ env.HELM_REPO }}/${{ env.BACKUP_IMAGE }}"
          )

          for image in "${IMAGES_TO_CACHE[@]}"; do
            echo "📥 Pre-caching: $image"
            # Use direct docker pull with cache benefits from buildx daemon
            if docker pull "$image" 2>/dev/null; then
              echo "✅ Cached: $image"
            else
              echo "⚠️ Could not pre-cache: $image (will be pulled on-demand)"
            fi
          done

          echo "🎉 Base layer caching complete!"

      # Show cache information for debugging
      - name: 📊 Cache Information
        run: |
          echo "📋 Docker Layer Cache Information:"
          echo "Cache Key: helm-images-${{ runner.os }}-${{ hashFiles('example.versions.env') }}-v2"
          echo "Cache Path: /tmp/.buildx-cache"
          if [ -d "/tmp/.buildx-cache" ]; then
            echo "Cache Size: $(du -sh /tmp/.buildx-cache 2>/dev/null | cut -f1 || echo 'unknown')"
            echo "Cache Contents: $(ls -la /tmp/.buildx-cache 2>/dev/null | wc -l || echo '0') files"
          else
            echo "Cache Status: Not found (first run or cache miss)"
          fi
          echo ""
          echo "💡 Cache will be reused across deployments until image versions change in example.versions.env"

      - name: 🛠️ Optimized Helm Images Push to Artifactory
        run: |
          # Use the utility script for consistency across all workflows
          if [ -f "./openshift/scripts/optimize-image-push.sh" ]; then
            echo "🚀 Using optimize-image-push.sh utility script for Helm chart images"
            chmod +x ./openshift/scripts/optimize-image-push.sh

            # Track optimization results
            TOTAL_IMAGES=0
            CACHED_IMAGES=0
            FAILED_IMAGES=0

            # Array of Helm images to process (construct full image paths)
            declare -a HELM_IMAGES=(
              "${{ env.HELM_REPO }}/${{ env.MARIADB_IMAGE }}"
              "${{ env.HELM_REPO }}/${{ env.REDIS_IMAGE }}"
              "${{ env.HELM_REPO }}/${{ env.REDIS_SENTINEL_IMAGE }}"
              "${{ env.HELM_REPO }}/${{ env.BACKUP_IMAGE }}"
            )

            # Process each Helm image
            for image in "${HELM_IMAGES[@]}"; do
              echo "📦 Processing Helm image: $image"
              TOTAL_IMAGES=$((TOTAL_IMAGES + 1))

              # The optimize-image-push.sh script will handle the naming transformation
              # bitnamilegacy/mariadb-galera:tag -> artifacts.developer.gov.bc.ca/m950-learning/mariadb-galera:tag

              if ./openshift/scripts/optimize-image-push.sh \
                --source-image "$image" \
                --artifactory-url "${{ secrets.ARTIFACTORY_URL }}" \
                --timeout 600 \
                --retry-count 3; then                # Check if it was cached
                if [ "${{ env.IMAGE_CACHE_HIT }}" = "true" ]; then
                  CACHED_IMAGES=$((CACHED_IMAGES + 1))
                  echo "✅ $image: CACHED (time saved)"
                else
                  echo "✅ $image: PUSHED (updated in Artifactory)"
                fi
              else
                FAILED_IMAGES=$((FAILED_IMAGES + 1))
                echo "❌ $image: FAILED"
              fi

              echo "---"
            done

            # Set summary environment variables
            echo "HELM_TOTAL_IMAGES=$TOTAL_IMAGES" >> $GITHUB_ENV
            echo "HELM_CACHED_IMAGES=$CACHED_IMAGES" >> $GITHUB_ENV
            echo "HELM_FAILED_IMAGES=$FAILED_IMAGES" >> $GITHUB_ENV

            # Fail workflow if any images failed
            if [ $FAILED_IMAGES -gt 0 ]; then
              echo "❌ $FAILED_IMAGES Helm images failed to process"
              exit 1
            fi

          else
            echo "❌ optimize-image-push.sh utility script not found"
            echo "💡 This script is required for optimized image handling"
            echo "📋 Expected location: ./openshift/scripts/optimize-image-push.sh"
            echo "🔧 Please ensure the utility script is included in the repository"
            exit 1
          fi

      # Report optimization results for Helm images
      - name: 📊 Helm Images Optimization Report
        if: always()
        run: |
          echo "=============================================="
          echo "📊 HELM CHART IMAGES OPTIMIZATION REPORT"
          echo "=============================================="
          echo "Supply Chain Resilience Strategy: Cache all Helm chart images"
          echo ""
          echo "Images Processed:"
          echo "  MariaDB Galera: ${{ env.HELM_REPO }}/${{ env.MARIADB_IMAGE }}"
          echo "  Redis: ${{ env.HELM_REPO }}/${{ env.REDIS_IMAGE }}"
          echo "  Redis Sentinel: ${{ env.HELM_REPO }}/${{ env.REDIS_SENTINEL_IMAGE }}"
          echo "  Backup Container: ${{ env.HELM_REPO }}/${{ env.BACKUP_IMAGE }}"
          echo ""
          echo "Results Summary:"
          echo "  Total Images: ${HELM_TOTAL_IMAGES:-0}"
          echo "  Cached (no action needed): ${HELM_CACHED_IMAGES:-0}"
          echo "  Updated in Artifactory: $((${HELM_TOTAL_IMAGES:-0} - ${HELM_CACHED_IMAGES:-0}))"
          echo "  Failed: ${HELM_FAILED_IMAGES:-0}"
          echo ""

          # Calculate total optimization
          if [ "${HELM_CACHED_IMAGES:-0}" -gt 0 ]; then
            ESTIMATED_SAVINGS=$((${HELM_CACHED_IMAGES:-0} * 120))  # 120s average per Helm image
            echo "⚡ Estimated Time Saved: ~${ESTIMATED_SAVINGS}s"
            echo "🎉 Optimization: SUCCESSFUL"
          else
            echo "🔄 Optimization: All images were updated"
          fi

          echo ""
          echo "🛡️ Supply Chain Benefits:"
          echo "  • Helm chart images cached in private Artifactory"
          echo "  • Protected against upstream repository changes"
          echo "  • Reduced dependency on external registries"
          echo "  • Consistent image availability for deployments"
          echo "=============================================="