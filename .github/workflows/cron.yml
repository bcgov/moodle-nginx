name: Cron

concurrency:
  group: cron-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP: moodle
  USER: ${{ github.actor }}

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-images:
    name: '🐸 Build to JFrog'
    runs-on: ubuntu-22.04
    steps:
      # Checkout the PR branch
      - name: 📤 Checkout Target Branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
          sparse-checkout: |
            config/cron
            config/php
            config/moodle
            example.env
            example.versions.env
            openshift/scripts

      # Login to Artifactory (with retry for transient network issues)
      - name: 🔁 Artifactory login with retry
        run: |
          for attempt in 1 2 3; do
            if docker login "${{ secrets.ARTIFACTORY_URL }}" \
              -u "${{ secrets.ARTIFACTORY_USER }}" \
              -p "${{ secrets.ARTIFACTORY_PASSWORD }}" 2>&1; then
              echo "✅ Artifactory login succeeded (attempt $attempt)"
              exit 0
            fi
            echo "⚠️ Login attempt $attempt/3 failed, retrying in 10s..."
            sleep 10
          done
          echo "❌ Artifactory login failed after 3 attempts"
          exit 1

      - name: 🔑 Login to Artifactory
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ARTIFACTORY_URL }}
          username: ${{ secrets.ARTIFACTORY_USER }}
          password: ${{ secrets.ARTIFACTORY_PASSWORD }}

      - name: Setup Env Vars
        id: dotenv
        uses: falti/dotenv-action@v1
        with:
          path: example.env
          export-variables: true
          keys-case: upper

      - name: Setup Versions Env Vars
        id: dotenv_versions
        uses: falti/dotenv-action@v1
        with:
          path: example.versions.env
          export-variables: true
          keys-case: upper

      - name: 🛠️ Pull Base Image
        run: |
          docker pull ${{ env.CRON_IMAGE }}

      - name: 🐸 Push to JFrog
        run: |
          docker tag ${{ env.CRON_IMAGE }} ${{ secrets.ARTIFACTORY_URL }}/${{ env.CRON_IMAGE }}
          docker push ${{ secrets.ARTIFACTORY_URL }}/${{ env.CRON_IMAGE }}
          docker buildx build --cache-from type=gha,scope=${{ github.ref_name }} --cache-to type=gha,scope=${{ github.ref_name }},mode=min --build-arg DOCKER_FROM_IMAGE=${{ secrets.ARTIFACTORY_URL }}/${{ env.CRON_IMAGE }} --tag ${{ secrets.ARTIFACTORY_URL }}/${{ env.CRON_NAME }}:${{ github.ref_name }} --output=type=image,push=true --push -f ${{ env.CRON_DOCKER_FILE_PATH }} .
