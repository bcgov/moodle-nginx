name: Redis

concurrency:
  group: redis-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  APP: moodle
  USER: ${{ github.actor }}

on:
  workflow_call:

jobs:
  build-images:
    name: '🐸 Build to JFrog'
    runs-on: ubuntu-22.04
    steps:
      # Checkout the PR branch
      - name: 📤 Checkout Target Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          sparse-checkout: |
            config/redis
            example.env
            example.versions.env
            openshift/scripts
            Redis.Proxy.Dockerfile

      # Login to Artifactory
      - name: 🔑 Login to Artifactory
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ARTIFACTORY_URL }}
          username: ${{ secrets.ARTIFACTORY_USER }}
          password: ${{ secrets.ARTIFACTORY_PASSWORD }}

      - name: Setup Env Vars
        id: dotenv
        uses: falti/dotenv-action@v1
        with:
          path: example.env
          export-variables: true
          keys-case: upper

      - name: Setup Versions Env Vars
        id: dotenv_versions
        uses: falti/dotenv-action@v1
        with:
          path: example.versions.env
          export-variables: true
          keys-case: upper

      - name: 🛠️ Optimized Base Images Push to Artifactory
        run: |
          # Use the utility script for consistency across all workflows
          if [ -f "./openshift/scripts/optimize-image-push.sh" ]; then
            echo "🚀 Using optimize-image-push.sh utility script for multiple images"
            chmod +x ./openshift/scripts/optimize-image-push.sh

            # Optimize Golang base image
            echo "📦 Processing Golang base image..."
            ./openshift/scripts/optimize-image-push.sh \
              --source-image "${{ env.GOLANG_IMAGE }}" \
              --artifactory-url "${{ secrets.ARTIFACTORY_URL }}" \
              --timeout 300 \
              --retry-count 3

            # Store results for Golang image
            GOLANG_CACHE_HIT="${IMAGE_CACHE_HIT:-false}"
            GOLANG_BUILD_TIME="${IMAGE_BUILD_TIME:-0}"

            # Optimize Ubuntu base image
            echo "� Processing Ubuntu base image..."
            ./openshift/scripts/optimize-image-push.sh \
              --source-image "${{ env.UBUNTU_IMAGE }}" \
              --artifactory-url "${{ secrets.ARTIFACTORY_URL }}" \
              --timeout 300 \
              --retry-count 3

            # Store results for Ubuntu image
            UBUNTU_CACHE_HIT="${IMAGE_CACHE_HIT:-false}"
            UBUNTU_BUILD_TIME="${IMAGE_BUILD_TIME:-0}"

            # Set summary environment variables
            echo "GOLANG_CACHE_HIT=$GOLANG_CACHE_HIT" >> $GITHUB_ENV
            echo "GOLANG_BUILD_TIME=$GOLANG_BUILD_TIME" >> $GITHUB_ENV
            echo "UBUNTU_CACHE_HIT=$UBUNTU_CACHE_HIT" >> $GITHUB_ENV
            echo "UBUNTU_BUILD_TIME=$UBUNTU_BUILD_TIME" >> $GITHUB_ENV

          else
            echo "❌ optimize-image-push.sh utility script not found"
            echo "💡 This script is required for optimized image handling"
            echo "📋 Expected location: ./openshift/scripts/optimize-image-push.sh"
            echo "🔧 Please ensure the utility script is included in the repository"
            exit 1
          fi

      # Report optimization results
      - name: 📊 Redis Proxy Images Optimization Report
        if: always()
        run: |
          echo "=============================================="
          echo "📊 REDIS PROXY BASE IMAGES OPTIMIZATION REPORT"
          echo "=============================================="
          echo "Golang Image: ${{ env.GOLANG_IMAGE }}"
          echo "  Cache Hit: ${{ env.GOLANG_CACHE_HIT || 'false' }}"
          echo "  Build Time: ${{ env.GOLANG_BUILD_TIME || '0' }}s"
          echo ""
          echo "Ubuntu Image: ${{ env.UBUNTU_IMAGE }}"
          echo "  Cache Hit: ${{ env.UBUNTU_CACHE_HIT || 'false' }}"
          echo "  Build Time: ${{ env.UBUNTU_BUILD_TIME || '0' }}s"
          echo ""

          # Calculate total optimization using GitHub Actions env vars
          TOTAL_OPTIMIZED=0
          if [ "${{ env.GOLANG_CACHE_HIT }}" = "true" ]; then
            TOTAL_OPTIMIZED=$((TOTAL_OPTIMIZED + 1))
          fi
          if [ "${{ env.UBUNTU_CACHE_HIT }}" = "true" ]; then
            TOTAL_OPTIMIZED=$((TOTAL_OPTIMIZED + 1))
          fi

          echo "Optimization Summary:"
          echo "  Images Cached: $TOTAL_OPTIMIZED/2"
          echo "  Estimated Time Saved: ~$((TOTAL_OPTIMIZED * 60))-$((TOTAL_OPTIMIZED * 300))s"

          if [ $TOTAL_OPTIMIZED -gt 0 ]; then
            echo "🎉 Optimization: SUCCESSFUL"
          else
            echo "🔄 Optimization: All images were updated"
          fi
          echo "=============================================="

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push Redis Proxy Image to Artifactory
      - name: 🛠️ Build and Push Redis Proxy Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Redis.Proxy.Dockerfile
          provenance: false
          outputs: type=image,push=true,oci-mediatypes=false
          tags: ${{ secrets.ARTIFACTORY_URL }}/${{ env.REDIS_PROXY_NAME }}:${{ github.ref_name }}
          build-args: |
            GOLANG_FROM_IMAGE=${{ secrets.ARTIFACTORY_URL }}/${{ env.GOLANG_IMAGE }}
            UBUNTU_FROM_IMAGE=${{ secrets.ARTIFACTORY_URL }}/${{ env.UBUNTU_IMAGE }}
