# Generate Environment Files and Manifests
# Triggers when example.versions.env is modified
# Automatically generates all required environment and manifest files

name: Generate Environment and Manifest Files

on:
  push:
    paths:
      - 'example.versions.env'
      - '.github/workflows/generate-manifests.yml'
    branches:
      - main
      - 'dev'
      - '950003-dev'
      - 'feature/**'
      - 'hotfix/**'
  
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: 'Force regeneration of all files'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-manifests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Check if example.versions.env exists
      run: |
        if [ ! -f "example.versions.env" ]; then
          echo "❌ example.versions.env not found"
          exit 1
        fi
        echo "✅ Found example.versions.env"

    - name: Parse version variables
      id: versions
      run: |
        echo "Parsing version variables..."
        
        # Read and export all variables from example.versions.env
        while IFS='=' read -r key value; do
          # Skip comments and empty lines
          if [[ $key =~ ^[A-Z_]+$ ]]; then
            # Remove quotes if present
            clean_value=$(echo "$value" | sed 's/^"//;s/"$//')
            echo "$key=$clean_value" >> $GITHUB_ENV
            echo "  $key=$clean_value"
          fi
        done < example.versions.env
        
        # Set timestamp
        echo "GENERATED_AT=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

    - name: Create directories
      run: |
        mkdir -p openshift/dependencies
        mkdir -p .github
        mkdir -p config/generated

    - name: Generate Docker Images Manifest
      run: |
        cat > openshift/dependencies/images.yml << 'EOF'
        # Auto-generated Docker images manifest for Dependabot scanning
        # DO NOT EDIT MANUALLY - Generated by GitHub Actions
        # Source: example.versions.env
        # Generated: ${{ env.GENERATED_AT }}

        version: '3.8'
        services:
          # Core Application Services
          php:
            image: ${{ env.PHP_IMAGE }}
          
          cron:
            image: ${{ env.CRON_IMAGE }}
          
          database:
            image: ${{ env.DB_IMAGE }}
          
          web:
            image: ${{ env.WEB_IMAGE }}
          
          # Infrastructure Services  
          backup:
            image: ${{ env.BACKUP_IMAGE }}
          
          redis:
            image: ${{ env.REDIS_IMAGE }}
          
          redis-sentinel:
            image: ${{ env.REDIS_SENTINEL_IMAGE }}
          
          # Build/Development Tools
          golang:
            image: ${{ env.GOLANG_IMAGE }}
          
          ubuntu:
            image: ${{ env.UBUNTU_IMAGE }}

        # Metadata for automated processing
        metadata:
          generated_at: "${{ env.GENERATED_AT }}"
          generator: "GitHub Actions"
          workflow: "${{ github.workflow }}"
          commit: "${{ github.sha }}"
          source_file: "example.versions.env"
          purpose: "Dependabot Docker image security scanning"
        EOF

    - name: Generate Security Tools Manifest
      run: |
        cat > .github/security-tools.json << 'EOF'
        {
          "generated_at": "${{ env.GENERATED_AT }}",
          "generator": "GitHub Actions",
          "workflow": "${{ github.workflow }}",
          "commit": "${{ github.sha }}",
          "source_file": "example.versions.env",
          "tools": {
            "trivy": {
              "version": "${{ env.TRIVY_VERSION }}",
              "description": "Container vulnerability scanner",
              "usage": "Security scanning in CI/CD"
            },
            "docker_scout": {
              "version": "${{ env.DOCKER_SCOUT_VERSION }}",
              "description": "Docker security analysis",
              "usage": "Image vulnerability assessment"
            }
          },
          "scan_frequency": "daily",
          "alert_channels": ["rocket-chat", "github-issues"]
        }
        EOF

    - name: Generate Development Environment File
      run: |
        cat > .env.generated << 'EOF'
        # Auto-generated environment file for local development
        # DO NOT EDIT MANUALLY - Generated by GitHub Actions
        # Source: example.versions.env
        # Generated: ${{ env.GENERATED_AT }}

        # Core Images
        PHP_IMAGE=${{ env.PHP_IMAGE }}
        CRON_IMAGE=${{ env.CRON_IMAGE }}
        DB_IMAGE=${{ env.DB_IMAGE }}
        WEB_IMAGE=${{ env.WEB_IMAGE }}
        REDIS_IMAGE=${{ env.REDIS_IMAGE }}
        REDIS_SENTINEL_IMAGE=${{ env.REDIS_SENTINEL_IMAGE }}

        # Infrastructure Images
        BACKUP_IMAGE=${{ env.BACKUP_IMAGE }}
        GOLANG_IMAGE=${{ env.GOLANG_IMAGE }}
        UBUNTU_IMAGE=${{ env.UBUNTU_IMAGE }}

        # Versions
        REDIS_CHART_VERSION=${{ env.REDIS_CHART_VERSION }}
        COMPOSER_VERSION=${{ env.COMPOSER_VERSION }}
        TRIVY_VERSION=${{ env.TRIVY_VERSION }}
        DOCKER_SCOUT_VERSION=${{ env.DOCKER_SCOUT_VERSION }}

        # Build Configuration
        IMAGE_REBUILD_TIME_LIMIT=${{ env.IMAGE_REBUILD_TIME_LIMIT }}

        # Metadata
        GENERATED_AT=${{ env.GENERATED_AT }}
        GENERATED_BY=GitHub Actions
        SOURCE_COMMIT=${{ github.sha }}
        EOF

    - name: Generate Docker Compose Override
      run: |
        cat > docker-compose.local.yml << 'EOF'
        # docker-compose.local.yml
        # Local development override using generated environment variables
        # Usage: docker-compose -f docker-compose.yml -f docker-compose.local.yml up
        # Generated: ${{ env.GENERATED_AT }}

        version: '3.8'

        services:
          # Override build-0 to use environment variables
          build-0:
            environment:
              - PHP_IMAGE=${{ env.PHP_IMAGE }}
              - REDIS_IMAGE=${{ env.REDIS_IMAGE }}
            build:
              args:
                DOCKER_FROM_IMAGE: ${{ env.PHP_IMAGE }}

          # Override Redis services to use environment variables  
          redis:
            image: ${{ env.REDIS_IMAGE }}
            
          redis-sentinel:
            image: ${{ env.REDIS_SENTINEL_IMAGE }}

        # Local development configuration
        x-local-dev:
          environment:
            - ENVIRONMENT=local
            - DEBUG=true
            - GENERATED_AT=${{ env.GENERATED_AT }}
            - SOURCE_COMMIT=${{ github.sha }}
        EOF

    - name: Generate Dependabot Configuration
      run: |
        cat > .github/dependabot.yml << 'EOF'
        # Dependabot configuration for automated dependency updates
        # Generated: ${{ env.GENERATED_AT }}

        version: 2
        updates:
          # Docker images in compose files
          - package-ecosystem: "docker"
            directory: "/"
            schedule:
              interval: "weekly"
              day: "monday"
              time: "09:00"
            reviewers:
              - "@bcgov/platform-services"
            commit-message:
              prefix: "deps(docker)"
              include: "scope"
            
          # Docker images in dependencies manifest
          - package-ecosystem: "docker" 
            directory: "/openshift/dependencies"
            schedule:
              interval: "weekly"  
              day: "monday"
              time: "10:00"
            reviewers:
              - "@bcgov/platform-services"
            commit-message:
              prefix: "deps(security)"
              include: "scope"

          # GitHub Actions
          - package-ecosystem: "github-actions"
            directory: "/"
            schedule:
              interval: "weekly"
              day: "tuesday" 
              time: "09:00"
            reviewers:
              - "@bcgov/platform-services"
            commit-message:
              prefix: "deps(actions)"
              include: "scope"
        EOF

    - name: Generate README for Generated Files
      run: |
        cat > config/generated/README.md << 'EOF'
        # Generated Files

        This directory contains files automatically generated by GitHub Actions when `example.versions.env` is modified.

        ## Generated Files

        | File | Purpose | Generator |
        |------|---------|-----------|
        | `.env.generated` | Environment variables for docker-compose | GitHub Actions |
        | `docker-compose.local.yml` | Docker compose override for local development | GitHub Actions |
        | `openshift/dependencies/images.yml` | Docker images manifest for Dependabot scanning | GitHub Actions |
        | `.github/security-tools.json` | Security tools version manifest | GitHub Actions |
        | `.github/dependabot.yml` | Dependabot configuration | GitHub Actions |

        ## Workflow

        1. **Modify versions**: Edit `example.versions.env` with new version numbers
        2. **Commit changes**: Push your changes to any branch
        3. **Automatic generation**: GitHub Actions detects the change and generates all files
        4. **Auto-commit**: Generated files are automatically committed to the same branch
        5. **Pull updates**: If working locally, pull the latest changes to get generated files

        ## Local Development

        After GitHub Actions runs, you can:

        ```bash
        # Pull the latest generated files
        git pull

        # Start development environment
        docker-compose -f docker-compose.yml -f docker-compose.local.yml up

        # Or use the generated environment file
        docker-compose --env-file .env.generated up
        ```

        ## Single Source of Truth

        - **Source**: `example.versions.env` (manual maintenance)
        - **Generated**: All other environment and manifest files (automatic)
        - **Workflow**: GitHub Actions ensures consistency across all generated files

        Generated: ${{ env.GENERATED_AT }}
        Commit: ${{ github.sha }}
        EOF

    - name: Check for changes
      id: changes
      run: |
        git add .
        if git diff --staged --quiet; then
          echo "No changes to commit"
          echo "changes=false" >> $GITHUB_OUTPUT
        else
          echo "Changes detected"
          echo "changes=true" >> $GITHUB_OUTPUT
        fi

    - name: Commit generated files
      if: steps.changes.outputs.changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        git add .
        git commit -m "🤖 Auto-generate environment and manifest files
        
        - Generated from example.versions.env
        - Timestamp: ${{ env.GENERATED_AT }}
        - Commit: ${{ github.sha }}
        
        Files updated:
        - .env.generated
        - docker-compose.local.yml  
        - openshift/dependencies/images.yml
        - .github/security-tools.json
        - .github/dependabot.yml
        - config/generated/README.md"

    - name: Push changes
      if: steps.changes.outputs.changes == 'true'
      run: |
        git push

    - name: Summary
      run: |
        echo "## 🚀 Manifest Generation Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Generated Files:" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ `.env.generated` - Environment variables" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ `docker-compose.local.yml` - Local development override" >> $GITHUB_STEP_SUMMARY  
        echo "- ✅ `openshift/dependencies/images.yml` - Docker images manifest" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ `.github/security-tools.json` - Security tools manifest" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ `.github/dependabot.yml` - Dependabot configuration" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ `config/generated/README.md` - Documentation" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
        echo "1. Pull latest changes: \`git pull\`" >> $GITHUB_STEP_SUMMARY
        echo "2. Start development: \`docker-compose -f docker-compose.yml -f docker-compose.local.yml up\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Generated at:** ${{ env.GENERATED_AT }}" >> $GITHUB_STEP_SUMMARY
        echo "**Source commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY