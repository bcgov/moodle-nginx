kind: Template
apiVersion: template.openshift.io/v1
metadata:
  name: check-pod-logs
parameters:
  - name: OPENSHIFT_SERVER
    description: The OpenShift server URL
    required: true
  - name: OPENSHIFT_SA_TOKEN_NAME
    description: The name of the secret containing the service account token
    required: true
  - name: DEPLOY_NAMESPACE
    description: The namespace where the deployment is located
    required: true
  - name: ROCKETCHAT_WEBHOOK_URL
    description: Rocket.Chat webhook URL for notifications
    value: ""
  - name: USE_LOG_AGGREGATOR
    description: Enable enhanced logging and notifications
    value: "true"
objects:
  - apiVersion: v1
    kind: Secret
    metadata:
      name: notification-webhooks
      namespace: ${DEPLOY_NAMESPACE}
    type: Opaque
    stringData:
      rocketchat-webhook-url: ${ROCKETCHAT_WEBHOOK_URL}
  - apiVersion: batch/v1
    kind: CronJob
    metadata:
      name: check-pod-logs
    spec:
      schedule: "*/5 * * * *" # Run every 5 minutes
      concurrencyPolicy: Forbid
      jobTemplate:
        spec:
          template:
            spec:
              containers:
                - name: check-errors
                  image: openshift/origin-cli
                  resources:
                    requests:
                      cpu: 50m
                      memory: 256Mi
                  command: ["/bin/sh", "-c"]
                  args:
                    - /scripts/check-pod-logs.sh
                  env:
                    - name: OPENSHIFT_TOKEN
                      valueFrom:
                        secretKeyRef:
                          name: ${OPENSHIFT_SA_TOKEN_NAME}
                          key: token
                    - name: OPENSHIFT_SERVER
                      value: ${OPENSHIFT_SERVER}
                    - name: DEPLOY_NAMESPACE
                      value: ${DEPLOY_NAMESPACE}
                    # Database credentials from moodle-secrets
                    - name: DB_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: moodle-secrets
                          key: database-password
                    - name: DB_USER
                      valueFrom:
                        secretKeyRef:
                          name: moodle-secrets
                          key: database-user
                    - name: DB_NAME
                      valueFrom:
                        secretKeyRef:
                          name: moodle-secrets
                          key: database-name
                    - name: USE_LOG_AGGREGATOR
                      value: ${USE_LOG_AGGREGATOR}
                    - name: ROCKET_CHAT_WEBHOOK
                      valueFrom:
                        secretKeyRef:
                          name: notification-webhooks
                          key: rocketchat-webhook-url
                          optional: true
                  volumeMounts:
                    - name: script-volume
                      mountPath: /scripts
              restartPolicy: OnFailure
              volumes:
                - name: script-volume
                  configMap:
                    name: check-pod-logs-script
                    defaultMode: 0755
