# Helm Charts for Moodle Platform
# This file enables Dependabot to scan Helm chart dependencies
# Charts are synchronized from example.versions.env
# Location: openshift/dependencies/Chart.yaml

apiVersion: v2
name: moodle-platform-dependencies
description: Helm chart dependencies for Moodle platform
type: application
version: 1.0.0
appVersion: "1.0.0"

dependencies:
  - name: redis
    repository: https://charts.bitnami.com/bitnami
    version: "23.1.3"
    condition: redis.enabled

  - name: backup-storage
    repository: https://bcgov.github.io/helm-charts
    version: "latest"
    condition: backup.enabled