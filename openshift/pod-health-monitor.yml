kind: Template
apiVersion: template.openshift.io/v1
metadata:
  name: pod-health-monitor
  annotations:
    description: "Continuous pod health monitoring deployment"
    tags: "monitoring,galera,health-check"
parameters:
  - name: OPENSHIFT_SERVER
    description: The OpenShift server URL
    required: true
  - name: DEPLOY_NAMESPACE
    description: The namespace where the deployment is located
    required: true
  - name: OPENSHIFT_SA_TOKEN_NAME
    description: Name of the secret containing the service account token
    value: "github-actions-sa-token"
  - name: ROCKETCHAT_WEBHOOK_URL
    description: Rocket.Chat webhook URL for notifications
    value: ""
  - name: MONITORING_INTERVAL
    description: Interval between health checks in seconds
    value: "60"
  - name: GALERA_CHECK_INTERVAL
    description: Interval between Galera health checks in seconds
    value: "300"
  - name: ERROR_THRESHOLD
    description: Consecutive log error threshold before pod restart
    value: "3"
  - name: STATUS_REPORT_INTERVAL
    description: Interval for healthy status summary logs in seconds
    value: "600"
  - name: MANUAL_MODE
    description: Set true to disable all auto-healing actions
    value: "false"
  - name: AUTO_APPLY_GALERA_TIMEOUTS
    description: Auto-apply Galera timeout settings during recovery
    value: "true"
  - name: GALERA_AUTO_HEAL_LOCK_TTL_SECONDS
    description: Lock TTL to prevent overlapping auto-heal runs
    value: "1800"
  - name: GALERA_AUTO_HEAL_FAILURE_COOLDOWN_SECONDS
    description: Cooldown after failed auto-heal before retrying
    value: "900"
  - name: GALERA_AUTO_HEAL_ENABLE_FAILSAFE
    description: On failed auto-heal, activate failsafe lockdown
    value: "true"
  - name: GALERA_AUTO_HEAL_FAILSAFE_SCALE_REPLICAS
    description: Replica target when failsafe activates (0 recommended)
    value: "0"
  - name: GALERA_AUTO_HEAL_FAILSAFE_SET_MANUAL_MODE
    description: Set pod-health-monitor MANUAL_MODE=true during failsafe
    value: "true"
  - name: AUTO_ENABLE_MAINTENANCE
    description: Auto-enable maintenance mode when auto-heal failsafe activates
    value: "true"
  - name: AUTO_ENABLE_MOODLE_MAINTENANCE
    description: Enable Moodle maintenance mode when AUTO_ENABLE_MAINTENANCE triggers
    value: "YES"
  - name: AUTO_ENABLE_OPENSHIFT_MAINTENANCE
    description: Redirect OpenShift routes to maintenance page when AUTO_ENABLE_MAINTENANCE triggers
    value: "YES"
  - name: AUTO_MAINTENANCE_TIMEOUT_MINUTES
    description: Timeout window for emergency maintenance MANUAL_MODE lock
    value: "240"
  - name: MONITOR_IMAGE
    description: Full container image reference for the pod health monitor (oc CLI image)
    value: "image-registry.openshift-image-registry.svc:5000/openshift/cli:latest"
objects:
  - apiVersion: v1
    kind: Secret
    metadata:
      name: notification-webhooks
      namespace: ${DEPLOY_NAMESPACE}
    type: Opaque
    stringData:
      rocketchat-webhook-url: ${ROCKETCHAT_WEBHOOK_URL}

  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: pod-health-monitor
      namespace: ${DEPLOY_NAMESPACE}
      labels:
        app: pod-health-monitor
        component: monitoring
    spec:
      replicas: 1
      strategy:
        type: Recreate  # Ensure only one instance runs
      selector:
        matchLabels:
          app: pod-health-monitor
      template:
        metadata:
          labels:
            app: pod-health-monitor
        spec:
          serviceAccountName: github-actions-sa
          containers:
          - name: health-monitor
            image: ${MONITOR_IMAGE}
            command: ["/bin/bash", "/scripts/monitor-pods.sh"]
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                cpu: 100m
                memory: 256Mi
            env:
            - name: OPENSHIFT_SERVER
              value: ${OPENSHIFT_SERVER}
            - name: DEPLOY_NAMESPACE
              value: ${DEPLOY_NAMESPACE}
            - name: OPENSHIFT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ${OPENSHIFT_SA_TOKEN_NAME}
                  key: token
            - name: MONITORING_INTERVAL
              value: ${MONITORING_INTERVAL}
            - name: GALERA_CHECK_INTERVAL
              value: ${GALERA_CHECK_INTERVAL}
            - name: ERROR_THRESHOLD
              value: ${ERROR_THRESHOLD}
            - name: STATUS_REPORT_INTERVAL
              value: ${STATUS_REPORT_INTERVAL}
            # Manual mode override - set to 'true' to disable auto-healing during manual intervention
            - name: MANUAL_MODE
              value: ${MANUAL_MODE}
            - name: AUTO_APPLY_GALERA_TIMEOUTS
              value: ${AUTO_APPLY_GALERA_TIMEOUTS}
            - name: GALERA_AUTO_HEAL_LOCK_TTL_SECONDS
              value: ${GALERA_AUTO_HEAL_LOCK_TTL_SECONDS}
            - name: GALERA_AUTO_HEAL_FAILURE_COOLDOWN_SECONDS
              value: ${GALERA_AUTO_HEAL_FAILURE_COOLDOWN_SECONDS}
            - name: GALERA_AUTO_HEAL_ENABLE_FAILSAFE
              value: ${GALERA_AUTO_HEAL_ENABLE_FAILSAFE}
            - name: GALERA_AUTO_HEAL_FAILSAFE_SCALE_REPLICAS
              value: ${GALERA_AUTO_HEAL_FAILSAFE_SCALE_REPLICAS}
            - name: GALERA_AUTO_HEAL_FAILSAFE_SET_MANUAL_MODE
              value: ${GALERA_AUTO_HEAL_FAILSAFE_SET_MANUAL_MODE}
            - name: AUTO_ENABLE_MAINTENANCE
              value: ${AUTO_ENABLE_MAINTENANCE}
            - name: AUTO_ENABLE_MOODLE_MAINTENANCE
              value: ${AUTO_ENABLE_MOODLE_MAINTENANCE}
            - name: AUTO_ENABLE_OPENSHIFT_MAINTENANCE
              value: ${AUTO_ENABLE_OPENSHIFT_MAINTENANCE}
            - name: AUTO_MAINTENANCE_TIMEOUT_MINUTES
              value: ${AUTO_MAINTENANCE_TIMEOUT_MINUTES}
            - name: ROCKET_CHAT_WEBHOOK
              valueFrom:
                secretKeyRef:
                  name: notification-webhooks
                  key: rocketchat-webhook-url
                  optional: true
            # Database credentials for Galera health checks
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: moodle-secrets
                  key: database-password
                  optional: true
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: moodle-secrets
                  key: database-user
                  optional: true
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: moodle-secrets
                  key: database-name
                  optional: true
            volumeMounts:
            - name: openshift-scripts
              mountPath: /scripts
            - name: openshift-resources
              mountPath: /openshift
            livenessProbe:
              exec:
                command:
                - /bin/bash
                - -c
                - "ps aux | grep -v grep | grep monitor-pods.sh"
              initialDelaySeconds: 30
              periodSeconds: 60
            readinessProbe:
              exec:
                command:
                - /bin/bash
                - -c
                - "oc whoami >/dev/null 2>&1"
              initialDelaySeconds: 10
              periodSeconds: 30
              timeoutSeconds: 5
          volumes:
          - name: openshift-scripts
            configMap:
              name: openshift-scripts
              defaultMode: 0755
          - name: openshift-resources
            configMap:
              name: openshift-resources
              defaultMode: 0644
          restartPolicy: Always

  - apiVersion: v1
    kind: Service
    metadata:
      name: pod-health-monitor
      namespace: ${DEPLOY_NAMESPACE}
      labels:
        app: pod-health-monitor
    spec:
      selector:
        app: pod-health-monitor
      ports:
      - name: metrics
        port: 8080
        targetPort: 8080
        protocol: TCP
      type: ClusterIP
